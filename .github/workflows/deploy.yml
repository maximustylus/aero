name: Deploy SmartAeroSim to Firebase
on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  # This addresses your Node.js deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Use your specific Project Number and Service Account
          workload_identity_provider: 'projects/1031321304123/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deploy@smart-aero.iam.gserviceaccount.com'
          create_credentials_file: true

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          projectId: smart-aero
          channelId: live
          # This satisfies the "required" check without a physical key
          firebaseServiceAccount: "" 
        env:
          # This tells the Firebase CLI to use the WIF token
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
